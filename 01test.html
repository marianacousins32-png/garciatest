<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>球员数据库</title>
<style>
:root {
  --bg:#f5f6f7; --card:#fff; --text:#000; --sub:#555;
}
.dark {
  --bg:#121212; --card:#1e1e1e; --text:#fff; --sub:#aaa;
}
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; background:var(--bg); color:var(--text); }
.header { position:sticky; top:0; background:var(--card); border-bottom:1px solid #ddd; z-index:10; }
.header-toggle { width:100%; padding:10px; cursor:pointer; text-align:center; font-weight:bold; border:none; background:var(--card); }
.header-content { padding:10px; transition:max-height 0.3s ease; overflow:hidden; }
.search, .select, .input, .btn { width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; margin-bottom:6px; }
.container { padding:10px; }
.card { background:var(--card); border-radius:12px; padding:12px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); cursor:pointer; }
.name { font-size:16px; font-weight:bold; }
.row { font-size:13px; color:var(--sub); margin-top:4px; }
.highlight { color:red; }
.loading { text-align:center; padding:20px; color:var(--sub); }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; z-index:1000; }
.modal-content { position:absolute; bottom:0; width:100%; max-height:85%; background:var(--card); border-radius:16px 16px 0 0; overflow-y:auto; padding:15px; }
.close { text-align:right; font-size:18px; margin-bottom:10px; cursor:pointer; }
</style>
</head>
<body>

<button class="header-toggle" id="headerToggle">🔽 筛选 / 搜索栏</button>
<div class="header-content" id="headerContent">
  <input id="search" class="search" placeholder="搜索球员 / 球队">
  <select id="positionFilter" class="select"><option value="">全部位置</option></select>
  <input id="nationFilterInput" class="search" placeholder="输入国籍筛选">
  <select id="nationFilter" class="select"><option value="">全部国籍</option></select>
  <input id="caFilter" class="input" placeholder="最低CA">
  <input id="paFilter" class="input" placeholder="最低PA">
  <button id="themeToggle" class="btn">切换深色/浅色</button>
</div>

<div class="container" id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">关闭 ✕</div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const url = "https://angreoli-fagioli-garciatest-html.static.hf.space/%E6%90%9CV%E8%A1%A8EXCEL21%E4%BB%A5%E4%B8%8A%E6%89%8D%E8%83%BD%E6%89%93%E5%BC%80%EF%BC%88%E4%BF%AE%E6%94%B9%E6%BC%8F%E6%B4%9E%EF%BC%89.xlsx";
let data = [];
let headers = [];

fetch(url)
.then(res => res.arrayBuffer())
.then(buffer => {
  const workbook = XLSX.read(buffer, { type: "array" });
  const sheet = workbook.Sheets["数据"];
  if (!sheet) {
    document.getElementById("list").innerHTML = "<div class='loading'>未找到Sheet：数据</div>";
    return;
  }
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1 });
  headers = raw[1];
  data = raw.slice(2).map(row => {
    let obj = {};
    headers.forEach((h,i)=> obj[h]=row[i]);
    return obj;
  }).filter(r => Object.values(r).some(v=>v));
  initFilters();
  render(data);
});

function initFilters(){
  const posSet = new Set();
  const nationSet = new Set();
  data.forEach(d=>{
    const pos=d[headers[6]]; if(pos) posSet.add(pos);
    const nation=d[headers[70]]; if(nation) nationSet.add(nation);
  });
  const posSelect=document.getElementById("positionFilter");
  posSet.forEach(p=>{ const opt=document.createElement("option"); opt.value=p; opt.textContent=p; posSelect.appendChild(opt); });

  const nationSelect=document.getElementById("nationFilter");
  nationSet.forEach(n=>{ const opt=document.createElement("option"); opt.value=n; opt.textContent=n; nationSelect.appendChild(opt); });
}

// 国籍输入过滤下拉列表
document.getElementById("nationFilterInput").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const nationSelect = document.getElementById("nationFilter");
  for(let i=0;i<nationSelect.options.length;i++){
    const opt = nationSelect.options[i];
    opt.style.display = (opt.text.toLowerCase().includes(val) || opt.value === "") ? "" : "none";
  }
});

function render(list){
  const container=document.getElementById("list"); container.innerHTML="";
  list.forEach(item=>{
    const div=document.createElement("div"); div.className="card";
    const name=item[headers[0]]||"未知";
    const team=item["球队"]||"";
    const position=item[headers[6]]||"";
    const ca=item[headers[3]]||"";
    const pa=item[headers[4]]||"";
    const nation=item[headers[70]]||"";
    const isGarcia=String(name).includes("加西亚");
    div.innerHTML=`<div class="name ${isGarcia?'highlight':''}">${name}</div>
                     <div class="row">球队：${team}</div>
                     <div class="row">位置：${position}</div>
                     <div class="row">国籍：${nation}</div>
                     <div class="row">CA：${ca} | PA：${pa}</div>`;
    div.onclick=()=>openModal(item);
    container.appendChild(div);
  });
}

function openModal(item){
  const modal=document.getElementById("modal");
  const body=document.getElementById("modalBody");
  body.innerHTML=headers.map(h=>`<div class="row"><b>${h}</b>：${item[h]||""}</div>`).join("");
  modal.style.display="block";
}
function closeModal(){ document.getElementById("modal").style.display="none"; }

function applyFilters(){
  const keyword=document.getElementById("search").value.toLowerCase();
  const pos=document.getElementById("positionFilter").value;
  const nation=document.getElementById("nationFilter").value;
  const caVal=parseInt(document.getElementById("caFilter").value)||0;
  const paVal=parseInt(document.getElementById("paFilter").value)||0;
  const filtered=data.filter(item=>{
    const matchText=Object.values(item).some(v=>String(v).toLowerCase().includes(keyword));
    const matchPos=!pos||item[headers[6]]==pos;
    const matchNation=!nation||item[headers[70]]==nation;
    const matchCA=!caVal||(parseInt(item[headers[3]])>=caVal);
    const matchPA=!paVal||(parseInt(item[headers[4]])>=paVal);
    return matchText && matchPos && matchNation && matchCA && matchPA;
  });
  render(filtered);
}

["search","positionFilter","nationFilter","caFilter","paFilter","nationFilterInput"].forEach(id=>{
  document.getElementById(id).addEventListener("input",applyFilters);
});

// 主题切换按钮
document.getElementById("themeToggle").onclick=()=>{ document.body.classList.toggle("dark"); };

// 折叠/展开搜索栏
document.getElementById("headerToggle").onclick = ()=>{
  const content = document.getElementById("headerContent");
  if(content.style.maxHeight && content.style.maxHeight !== "0px"){
    content.style.maxHeight = "0px";
    document.getElementById("headerToggle").textContent = "🔽 筛选 / 搜索栏";
  } else {
    content.style.maxHeight = content.scrollHeight + "px";
    document.getElementById("headerToggle").textContent = "🔼 筛选 / 搜索栏";
  }
};
document.getElementById("headerContent").style.maxHeight = document.getElementById("headerContent").scrollHeight + "px";
</script>

</body>
</html>
