<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市球迷数据中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dqd-green': '#16b998',
                        'dqd-dark': '#1a1a1a',
                        'dqd-light': '#f5f5f5',
                        'dqd-card-light': '#ffffff',
                        'dqd-card-dark': '#2d2d2d',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }
        
        *::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        
        html, body {
            overflow-x: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .hide-scrollbar {
            overflow: -moz-scrollbars-none;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .fan-bar {
            transition: width 1s ease-out;
        }
        
        .city-card, .team-card {
            transition: all 0.3s ease;
        }
        
        .city-card:active, .team-card:active {
            transform: scale(0.98);
        }
        
        .tab-active {
            position: relative;
            color: #16b998;
            font-weight: 600;
        }
        
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #16b998;
            border-radius: 2px;
        }
        
        .team-badge {
            background: linear-gradient(135deg, #16b998 0%, #0d9488 100%);
        }
        
        .dark .team-badge {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
        }
        
        .search-input {
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(22, 185, 152, 0.2);
        }
        
        .stat-number {
            font-variant-numeric: tabular-nums;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        .dark .loading-skeleton {
            background: linear-gradient(90deg, #3d3d3d 25%, #4d4d4d 50%, #3d3d3d 75%);
            background-size: 200% 100%;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .expand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .expand-content.show {
            max-height: 1000px;
        }
        
        .team-item {
            transition: background-color 0.2s;
        }
        
        .team-item:hover {
            background-color: rgba(22, 185, 152, 0.05);
        }
        
        .dark .team-item:hover {
            background-color: rgba(22, 185, 152, 0.1);
        }
        
        .local-fan-bar {
            background: rgba(22, 185, 152, 0.2);
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .local-fan-fill {
            background: #16b998;
            height: 100%;
            transition: width 1s ease-out;
        }
    </style>
</head>
<body class="bg-dqd-light dark:bg-dqd-dark text-gray-800 dark:text-gray-100 transition-colors duration-300 min-h-screen overflow-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white dark:bg-dqd-card-dark shadow-sm border-b border-gray-200 dark:border-gray-700 transition-colors duration-300">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-dqd-green rounded-lg flex items-center justify-center text-white font-bold text-sm">
                    <i class="fas fa-futbol"></i>
                </div>
                <h1 class="text-lg font-bold text-gray-800 dark:text-white">球迷数据中心</h1>
            </div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 transition-all hover:scale-105 active:scale-95">
                <i class="fas fa-sun hidden dark:block"></i>
                <i class="fas fa-moon block dark:hidden"></i>
            </button>
        </div>
        
        <!-- View Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-dqd-card-dark">
            <button onclick="switchView('city')" id="cityTab" class="flex-1 py-3 text-sm font-medium text-center tab-active transition-colors">
                <i class="fas fa-city mr-1"></i>城市视图
            </button>
            <button onclick="switchView('team')" id="teamTab" class="flex-1 py-3 text-sm font-medium text-center text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                <i class="fas fa-shield-alt mr-1"></i>球队视图
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto h-[calc(100vh-120px)] overflow-y-auto hide-scrollbar">
        <div class="px-4 py-4 space-y-4">
            <!-- Search Bar -->
            <div class="relative sticky top-0 z-10 bg-dqd-light dark:bg-dqd-dark pb-2">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="搜索..." 
                    class="search-input w-full pl-12 pr-4 py-3 bg-white dark:bg-dqd-card-dark border border-gray-200 dark:border-gray-600 rounded-xl text-base outline-none dark:text-white placeholder-gray-400"
                    oninput="handleSearch()"
                >
                <button 
                    onclick="clearSearch()" 
                    id="clearBtn"
                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hidden hover:text-gray-600 dark:hover:text-gray-200"
                >
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>

            <!-- Quick Stats -->
            <div class="grid grid-cols-3 gap-3" id="statsContainer">
                <div class="bg-white dark:bg-dqd-card-dark p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1" id="stat1Label">总城市数</div>
                    <div class="text-xl font-bold text-dqd-green stat-number" id="stat1">-</div>
                </div>
                <div class="bg-white dark:bg-dqd-card-dark p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1" id="stat2Label">平均占比</div>
                    <div class="text-xl font-bold text-dqd-green stat-number" id="stat2">-</div>
                </div>
                <div class="bg-white dark:bg-dqd-card-dark p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1" id="stat3Label">最高占比</div>
                    <div class="text-xl font-bold text-dqd-green stat-number" id="stat3">-</div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="space-y-3">
                <div class="h-24 loading-skeleton rounded-xl"></div>
                <div class="h-24 loading-skeleton rounded-xl"></div>
                <div class="h-24 loading-skeleton rounded-xl"></div>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden text-center py-12">
                <i class="fas fa-exclamation-circle text-4xl text-red-400 mb-3"></i>
                <p class="text-gray-500 dark:text-gray-400">数据加载失败</p>
                <button onclick="fetchData()" class="mt-4 px-6 py-2 bg-dqd-green text-white rounded-full text-sm font-medium hover:opacity-90 transition-opacity">
                    重新加载
                </button>
            </div>

            <!-- Content -->
            <div id="content" class="space-y-4 hidden pb-20">
                <!-- Results count -->
                <div class="flex items-center justify-between text-sm text-gray-500 dark:text-gray-400 px-1">
                    <span id="resultCount">共 0 个</span>
                    <div class="flex gap-3" id="sortButtons">
                        <button onclick="sortBy('ratio')" class="hover:text-dqd-green transition-colors flex items-center gap-1 text-xs">
                            <i class="fas fa-sort-amount-down"></i> 按占比
                        </button>
                        <button onclick="sortBy('population')" class="hover:text-dqd-green transition-colors flex items-center gap-1 text-xs">
                            <i class="fas fa-users"></i> 按人口
                        </button>
                    </div>
                </div>

                <!-- Cities List -->
                <div id="citiesList" class="space-y-3"></div>

                <!-- Teams List -->
                <div id="teamsList" class="space-y-3 hidden"></div>
            </div>
        </div>
    </main>

    <script>
        let allData = [];
        let teamsData = [];
        let filteredData = [];
        let currentView = 'city';
        let currentSort = 'ratio';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Data Parsing
        function parseData(text) {
            const provinces = [];
            const lines = text.trim().split('\n');
            let currentProvince = null;
            let currentCity = null;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                if (line.startsWith('//')) {
                    if (currentCity && currentProvince) {
                        currentProvince.cities.push(currentCity);
                        currentCity = null;
                    }
                    if (currentProvince) {
                        provinces.push(currentProvince);
                    }
                    currentProvince = {
                        name: line.replace('//', '').trim(),
                        cities: []
                    };
                } else if (line.startsWith('/城市名：')) {
                    if (currentCity && currentProvince) {
                        currentProvince.cities.push(currentCity);
                    }
                    currentCity = {
                        name: line.replace('/城市名：', '').trim(),
                        alias: '',
                        population: 0,
                        fanRatio: 0,
                        totalLocalFans: 0, // 当地球迷总数
                        teams: []
                    };
                } else if (line.startsWith('别称：') && currentCity) {
                    currentCity.alias = line.replace('别称：', '').trim();
                } else if (line.startsWith('人口：') && currentCity) {
                    const popMatch = line.match(/([\d,]+)/);
                    if (popMatch) {
                        currentCity.population = parseInt(popMatch[1].replace(/,/g, ''));
                    }
                } else if (line.startsWith('球迷占比：') && currentCity) {
                    const ratioMatch = line.match(/(\d+)/);
                    if (ratioMatch) {
                        currentCity.fanRatio = parseInt(ratioMatch[1]);
                        // 计算当地球迷总数
                        currentCity.totalLocalFans = Math.round(currentCity.population * currentCity.fanRatio / 100);
                    }
                } else if (line.startsWith('当地球迷：') && currentCity) {
                    const teamsText = line.replace('当地球迷：', '').trim();
                    // 匹配 "xx%支持球队名" 的模式
                    const teamMatches = teamsText.match(/(\d+)%支持([^%\d]+?)(?=\s*\d+%支持|$)/g);
                    if (teamMatches) {
                        teamMatches.forEach(match => {
                            const parts = match.match(/(\d+)%支持(.+)/);
                            if (parts) {
                                const percentage = parseInt(parts[1]); // 这是占当地球迷的比例
                                const teamName = parts[2].trim();
                                // 球队球迷数 = 当地球迷总数 × 支持比例
                                const fans = Math.round(currentCity.totalLocalFans * percentage / 100);
                                currentCity.teams.push({
                                    name: teamName,
                                    localPercentage: percentage, // 占当地球迷的百分比
                                    fans: fans // 实际球迷人数
                                });
                            }
                        });
                    }
                }
            });

            if (currentCity && currentProvince) {
                currentProvince.cities.push(currentCity);
            }
            if (currentProvince) {
                provinces.push(currentProvince);
            }

            return provinces;
        }

        // Build Teams Data
        function buildTeamsData(provinces) {
            const teamsMap = new Map();
            
            provinces.forEach(province => {
                province.cities.forEach(city => {
                    city.teams.forEach(team => {
                        if (!teamsMap.has(team.name)) {
                            teamsMap.set(team.name, {
                                name: team.name,
                                cities: [],
                                totalFans: 0
                            });
                        }
                        const teamData = teamsMap.get(team.name);
                        teamData.cities.push({
                            cityName: city.name,
                            province: province.name,
                            localPercentage: team.localPercentage, // 在该城市当地球迷中的占比
                            fans: team.fans, // 在该城市的实际球迷数
                            totalLocalFans: city.totalLocalFans // 该城市总球迷数（用于参考）
                        });
                        teamData.totalFans += team.fans;
                    });
                });
            });

            return Array.from(teamsMap.values()).sort((a, b) => b.totalFans - a.totalFans);
        }

        function flattenCities(provinces) {
            const flat = [];
            provinces.forEach(province => {
                province.cities.forEach(city => {
                    flat.push({
                        ...city,
                        province: province.name
                    });
                });
            });
            return flat;
        }

        async function fetchData() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const content = document.getElementById('content');

            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            content.classList.add('hidden');

            try {
                const response = await fetch('https://angreoli-fagioli-garciatest-html.static.hf.space/%E5%9F%8E%E5%B8%82%E7%90%83%E8%BF%B7%E6%95%B0%E6%8D%AE.txt?t=' + Date.now(), {
                    cache: 'no-cache'
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const text = await response.text();
                const provinces = parseData(text);
                allData = flattenCities(provinces);
                teamsData = buildTeamsData(provinces);
                filteredData = [...allData];
                
                updateStats();
                renderCities();
                renderTeams();
                
                loadingState.classList.add('hidden');
                content.classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching data:', error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }

        function updateStats() {
            if (currentView === 'city') {
                document.getElementById('stat1Label').textContent = '总城市数';
                document.getElementById('stat2Label').textContent = '平均占比';
                document.getElementById('stat3Label').textContent = '最高占比';
                document.getElementById('stat1').textContent = allData.length;
                const avgRatio = allData.length > 0 ? (allData.reduce((sum, c) => sum + c.fanRatio, 0) / allData.length).toFixed(1) : 0;
                document.getElementById('stat2').textContent = avgRatio + '%';
                document.getElementById('stat3').textContent = allData.length > 0 ? Math.max(...allData.map(c => c.fanRatio)) + '%' : '0%';
            } else {
                document.getElementById('stat1Label').textContent = '总球队数';
                document.getElementById('stat2Label').textContent = '覆盖城市';
                document.getElementById('stat3Label').textContent = '球迷最多';
                document.getElementById('stat1').textContent = teamsData.length;
                const totalCities = new Set(allData.map(c => c.name)).size;
                document.getElementById('stat2').textContent = totalCities;
                const topTeam = teamsData.length > 0 ? teamsData[0].name.substring(0, 4) + '...' : '-';
                document.getElementById('stat3').textContent = topTeam;
            }
        }

        function switchView(view) {
            currentView = view;
            const cityTab = document.getElementById('cityTab');
            const teamTab = document.getElementById('teamTab');
            const citiesList = document.getElementById('citiesList');
            const teamsList = document.getElementById('teamsList');
            const sortButtons = document.getElementById('sortButtons');
            
            if (view === 'city') {
                cityTab.classList.add('tab-active');
                cityTab.classList.remove('text-gray-500', 'dark:text-gray-400');
                teamTab.classList.remove('tab-active');
                teamTab.classList.add('text-gray-500', 'dark:text-gray-400');
                citiesList.classList.remove('hidden');
                teamsList.classList.add('hidden');
                sortButtons.classList.remove('hidden');
                filteredData = [...allData];
            } else {
                teamTab.classList.add('tab-active');
                teamTab.classList.remove('text-gray-500', 'dark:text-gray-400');
                cityTab.classList.remove('tab-active');
                cityTab.classList.add('text-gray-500', 'dark:text-gray-400');
                citiesList.classList.add('hidden');
                teamsList.classList.remove('hidden');
                sortButtons.classList.add('hidden');
                filteredData = [...teamsData];
            }
            
            updateStats();
            handleSearch();
        }

        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toLocaleString();
        }

        function getRatioColor(ratio) {
            if (ratio >= 80) return 'bg-green-500';
            if (ratio >= 60) return 'bg-dqd-green';
            if (ratio >= 40) return 'bg-yellow-500';
            if (ratio >= 20) return 'bg-orange-400';
            return 'bg-red-400';
        }

        function getRatioTextColor(ratio) {
            if (ratio >= 80) return 'text-green-600 dark:text-green-400';
            if (ratio >= 60) return 'text-dqd-green';
            if (ratio >= 40) return 'text-yellow-600 dark:text-yellow-400';
            if (ratio >= 20) return 'text-orange-500 dark:text-orange-400';
            return 'text-red-500 dark:text-red-400';
        }

        function renderCities() {
            const container = document.getElementById('citiesList');
            const resultCount = document.getElementById('resultCount');
            
            const data = filteredData.length > 0 && filteredData[0].province ? filteredData : allData;
            resultCount.textContent = `共 ${data.length} 个城市`;
            
            if (data.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-search text-4xl mb-3 opacity-50"></i><p>未找到匹配的城市</p></div>';
                return;
            }

            const sortedData = [...data].sort((a, b) => {
                if (currentSort === 'ratio') return b.fanRatio - a.fanRatio;
                return b.population - a.population;
            });

            container.innerHTML = sortedData.map((city, index) => `
                <div class="city-card bg-white dark:bg-dqd-card-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="p-4 cursor-pointer" onclick="toggleCityExpand(this)">
                        <div class="flex items-start justify-between mb-3">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="text-lg font-bold text-gray-800 dark:text-white">${city.name}</h3>
                                    ${city.alias ? `<span class="text-xs text-gray-400 dark:text-gray-500">${city.alias}</span>` : ''}
                                </div>
                                <div class="inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-xs text-gray-600 dark:text-gray-300">
                                    <i class="fas fa-map-marker-alt mr-1 text-dqd-green"></i>${city.province}
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold ${getRatioTextColor(city.fanRatio)}">${city.fanRatio}%</div>
                                <div class="text-xs text-gray-400 dark:text-gray-500">球迷占比</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm text-gray-500 dark:text-gray-400">人口 ${formatNumber(city.population)}</span>
                            <span class="text-sm font-medium text-gray-600 dark:text-gray-300">当地球迷 ${formatNumber(city.totalLocalFans)}人</span>
                        </div>
                        
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-2">
                            <div class="fan-bar ${getRatioColor(city.fanRatio)} h-full rounded-full" style="width: ${city.fanRatio}%"></div>
                        </div>
                        
                        <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500 mt-2">
                            <span>${city.teams.length}支球队有当地球迷</span>
                            <i class="fas fa-chevron-down transition-transform duration-300"></i>
                        </div>
                    </div>
                    
                    <div class="expand-content bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700">
                        <div class="p-4 space-y-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 mb-2">
                                各队球迷占当地球迷（${formatNumber(city.totalLocalFans)}人）比例：
                            </div>
                            ${city.teams.sort((a, b) => b.localPercentage - a.localPercentage).map(team => `
                                <div class="bg-white dark:bg-dqd-card-dark rounded-lg p-3">
                                    <div class="flex items-center justify-between mb-2">
                                        <div class="flex items-center gap-2">
                                            <div class="w-6 h-6 rounded-full bg-dqd-green/10 flex items-center justify-center text-dqd-green text-xs">
                                                <i class="fas fa-shield-alt"></i>
                                            </div>
                                            <span class="text-sm font-bold text-gray-700 dark:text-gray-200">${team.name}</span>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-sm font-bold text-dqd-green">${team.localPercentage}%</div>
                                            <div class="text-xs text-gray-400">≈ ${formatNumber(team.fans)}人</div>
                                        </div>
                                    </div>
                                    <div class="local-fan-bar h-2">
                                        <div class="local-fan-fill rounded-full" style="width: ${team.localPercentage}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                            ${city.teams.length === 0 ? '<div class="text-center text-gray-400 text-sm py-2">暂无具体球队数据</div>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTeams() {
            const container = document.getElementById('teamsList');
            const resultCount = document.getElementById('resultCount');
            
            const data = filteredData.length > 0 && filteredData[0].cities ? filteredData : teamsData;
            resultCount.textContent = `共 ${data.length} 支球队`;
            
            if (data.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-search text-4xl mb-3 opacity-50"></i><p>未找到匹配的球队</p></div>';
                return;
            }

            container.innerHTML = data.map((team, index) => `
                <div class="team-card bg-white dark:bg-dqd-card-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="p-4 cursor-pointer" onclick="toggleTeamExpand(this)">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full team-badge flex items-center justify-center text-white text-lg font-bold">
                                    ${team.name.substring(0, 1)}
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800 dark:text-white">${team.name}</h3>
                                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">覆盖 ${team.cities.length} 个城市</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-dqd-green">${formatNumber(team.totalFans)}</div>
                                <div class="text-xs text-gray-400 dark:text-gray-500">总球迷数</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500 mt-2">
                            <span>主要分布：${getTopCities(team)}</span>
                            <i class="fas fa-chevron-down transition-transform duration-300"></i>
                        </div>
                    </div>
                    
                    <div class="expand-content bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700">
                        <div class="p-4">
                            <div class="space-y-2 max-h-64 overflow-y-auto hide-scrollbar">
                                ${team.cities.sort((a, b) => b.fans - a.fans).map(city => `
                                    <div class="team-item flex items-center justify-between py-3 px-3 bg-white dark:bg-dqd-card-dark rounded-lg">
                                        <div class="flex-1">
                                            <div class="flex items-center justify-between mb-1">
                                                <div class="flex items-center gap-2">
                                                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200">${city.cityName}</span>
                                                    <span class="text-xs text-gray-400">(${city.province})</span>
                                                </div>
                                                <div class="text-right">
                                                    <div class="text-sm font-bold text-dqd-green">${formatNumber(city.fans)}人</div>
                                                </div>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <div class="flex-1 local-fan-bar h-1.5">
                                                    <div class="local-fan-fill rounded-full" style="width: ${city.localPercentage}%"></div>
                                                </div>
                                                <span class="text-xs text-gray-400 w-10 text-right">${city.localPercentage}%</span>
                                            </div>
                                            <div class="text-xs text-gray-400 mt-1">
                                                占该城市当地球迷（${formatNumber(city.totalLocalFans)}人）的 ${city.localPercentage}%
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getTopCities(team) {
            const sorted = team.cities.sort((a, b) => b.fans - a.fans).slice(0, 2);
            return sorted.map(c => c.cityName).join('、') + (team.cities.length > 2 ? '等' : '');
        }

        function toggleCityExpand(element) {
            const content = element.nextElementSibling;
            const icon = element.querySelector('.fa-chevron-down');
            content.classList.toggle('show');
            icon.style.transform = content.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function toggleTeamExpand(element) {
            const content = element.nextElementSibling;
            const icon = element.querySelector('.fa-chevron-down');
            content.classList.toggle('show');
            icon.style.transform = content.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const clearBtn = document.getElementById('clearBtn');
            
            if (query) {
                clearBtn.classList.remove('hidden');
                if (currentView === 'city') {
                    filteredData = allData.filter(city => 
                        city.name.toLowerCase().includes(query) || 
                        city.province.toLowerCase().includes(query) ||
                        (city.alias && city.alias.toLowerCase().includes(query))
                    );
                    renderCities();
                } else {
                    filteredData = teamsData.filter(team => 
                        team.name.toLowerCase().includes(query) ||
                        team.cities.some(c => c.cityName.toLowerCase().includes(query) || c.province.toLowerCase().includes(query))
                    );
                    renderTeams();
                }
            } else {
                clearBtn.classList.add('hidden');
                filteredData = currentView === 'city' ? [...allData] : [...teamsData];
                if (currentView === 'city') renderCities();
                else renderTeams();
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.add('hidden');
            filteredData = currentView === 'city' ? [...allData] : [...teamsData];
            if (currentView === 'city') renderCities();
            else renderTeams();
        }

        function sortBy(type) {
            currentSort = type;
            renderCities();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            fetchData();
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchEndY - touchStartY;
            if (document.querySelector('main').scrollTop === 0 && diff > 100) {
                fetchData();
            }
        });
    </script>
</body>
</html>
