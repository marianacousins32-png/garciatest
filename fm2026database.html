<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加西亚足球数据库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 隐藏所有滚动条 */
        html, body { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        
        :root {
            --primary: #16a34a;
            --bg-light: #f0f2f5;
            --card-light: #ffffff;
            --text-light: #1f2937;
            --text-secondary-light: #6b7280;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-dark: #f1f5f9;
            --text-secondary-dark: #94a3b8;
        }
        .dark { background-color: var(--bg-dark); color: var(--text-dark); }
        .dark .card { background-color: var(--card-dark); }
        .dark .text-secondary { color: var(--text-secondary-dark); }
        .light { background-color: var(--bg-light); color: var(--text-light); }
        .light .card { background-color: var(--card-light); }
        .light .text-secondary { color: var(--text-secondary-light); }
        
        .skill-high { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: white; font-weight: bold; }
        .skill-higher { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; font-weight: bold; }
        .nav-active { color: var(--primary); position: relative; }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        /* 强制隐藏所有滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none !important; }
        .hide-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        .player-card { transition: all 0.2s ease; }
        .player-card:active { transform: scale(0.98); }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expandable-content.expanded { max-height: 3000px; transition: max-height 0.5s ease-in; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .position-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
        .pos-gk { background: #fef3c7; color: #92400e; }
        .pos-def { background: #dbeafe; color: #1e40af; }
        .pos-mid { background: #d1fae5; color: #065f46; }
        .pos-fwd { background: #fee2e2; color: #991b1b; }
        .dark .pos-gk { background: #451a03; color: #fbbf24; }
        .dark .pos-def { background: #1e3a8a; color: #60a5fa; }
        .dark .pos-mid { background: #064e3b; color: #34d399; }
        .dark .pos-fwd { background: #450a0a; color: #f87171; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        @media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(6, 1fr); } }
        
        .load-more-trigger { height: 50px; display: flex; align-items: center; justify-content: center; }
        .detail-modal { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); z-index: 100; 
            display: none; align-items: flex-end; 
        }
        .detail-modal.active { display: flex; }
        .detail-content { 
            background: var(--card-light); 
            width: 100%; height: 85vh; 
            border-radius: 20px 20px 0 0;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .detail-content::-webkit-scrollbar { display: none; }
        .dark .detail-content { background: var(--card-dark); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .detail-header { position: sticky; top: 0; background: inherit; z-index: 10; border-bottom: 1px solid #e5e7eb; }
        .dark .detail-header { border-color: #374151; }
        
        /* 主内容区隐藏滚动条 */
        #mainContent {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #mainContent::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="light min-h-screen pb-20 hide-scrollbar">
    <!-- 顶部栏 -->
    <header class="fixed top-0 left-0 right-0 z-50 card shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white font-bold text-sm">G</div>
                <h1 class="font-bold text-lg">加西亚足球</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 搜索栏 -->
    <div class="fixed top-14 left-0 right-0 z-40 card px-4 py-2 border-b border-gray-200 dark:border-gray-700">
        <div class="relative">
            <input type="text" id="searchInput" placeholder="搜索球员、球队、国籍、位置..." 
                class="w-full pl-10 pr-4 py-2.5 rounded-full bg-gray-100 dark:bg-gray-800 border-none text-sm focus:outline-none focus:ring-2 focus:ring-green-500 transition">
            <svg class="w-5 h-5 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>
        <div class="flex gap-2 mt-2 overflow-x-auto hide-scrollbar pb-1" id="filterTags">
            <button onclick="toggleFilter('all')" class="filter-btn active px-3 py-1.5 rounded-full text-xs font-medium bg-green-500 text-white whitespace-nowrap" data-filter="all">全部</button>
            <button onclick="toggleFilter('age')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 whitespace-nowrap" data-filter="age">年龄≤25</button>
            <button onclick="toggleFilter('ca')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 whitespace-nowrap" data-filter="ca">CA≥150</button>
            <button onclick="toggleFilter('pa')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 whitespace-nowrap" data-filter="pa">PA≥170</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="pt-36 px-4 hide-scrollbar" id="mainContent">
        <!-- 加载状态 -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full loading-spin mb-4"></div>
            <p class="text-secondary text-sm">加载球员数据中...</p>
        </div>
        
        <!-- 错误状态 -->
        <div id="errorState" class="hidden flex flex-col items-center justify-center py-20">
            <svg class="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <p class="text-secondary text-sm mb-2">数据加载失败</p>
            <button onclick="loadData()" class="px-4 py-2 bg-green-500 text-white rounded-full text-sm font-medium">重试</button>
        </div>

        <!-- 首页内容 -->
        <div id="homeView" class="hidden fade-in">
            <section class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-bold text-lg">🏆 CA Top 20</h2>
                    <span class="text-xs text-secondary">当前能力评级</span>
                </div>
                <div class="space-y-2" id="caTop20"></div>
            </section>
            <section class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-bold text-lg">⭐ PA Top 20</h2>
                    <span class="text-xs text-secondary">潜力评级</span>
                </div>
                <div class="space-y-2" id="paTop20"></div>
            </section>
        </div>

        <!-- 球员列表页 -->
        <div id="playersView" class="hidden fade-in">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-lg">所有球员</h2>
                <span class="text-xs text-secondary" id="playerCount">加载中...</span>
            </div>
            <div class="space-y-2" id="playersList"></div>
            <div id="playersLoadMore" class="load-more-trigger">
                <div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin"></div>
            </div>
        </div>

        <!-- 球队页 -->
        <div id="clubsView" class="hidden fade-in">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-lg">球队</h2>
                <span class="text-xs text-secondary" id="clubCount">加载中...</span>
            </div>
            <div class="space-y-3" id="clubsList"></div>
            <div id="clubsLoadMore" class="load-more-trigger">
                <div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin hidden"></div>
            </div>
        </div>

        <!-- 国家页 -->
        <div id="nationsView" class="hidden fade-in">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-lg">国家/地区</h2>
                <span class="text-xs text-secondary" id="nationCount">加载中...</span>
            </div>
            <div class="space-y-3" id="nationsList"></div>
            <div id="nationsLoadMore" class="load-more-trigger">
                <div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin hidden"></div>
            </div>
        </div>
    </main>

    <!-- 详情弹窗（球队/国家） -->
    <div id="detailModal" class="detail-modal" onclick="closeModal(event)">
        <div class="detail-content hide-scrollbar" onclick="event.stopPropagation()">
            <div class="detail-header px-4 py-3 flex items-center justify-between">
                <h2 id="modalTitle" class="font-bold text-lg">详情</h2>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modalBody" class="p-4 pb-20 hide-scrollbar"></div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 card border-t border-gray-200 dark:border-gray-700 safe-area-pb bg-opacity-95 backdrop-blur">
        <div class="flex justify-around items-center py-2">
            <button onclick="switchTab('home')" class="nav-btn nav-active flex flex-col items-center gap-1 p-2" data-tab="home">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                <span class="text-xs">首页</span>
            </button>
            <button onclick="switchTab('players')" class="nav-btn flex flex-col items-center gap-1 p-2 text-gray-400" data-tab="players">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span class="text-xs">球员</span>
            </button>
            <button onclick="switchTab('clubs')" class="nav-btn flex flex-col items-center gap-1 p-2 text-gray-400" data-tab="clubs">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
                <span class="text-xs">球队</span>
            </button>
            <button onclick="switchTab('nations')" class="nav-btn flex flex-col items-center gap-1 p-2 text-gray-400" data-tab="nations">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-xs">国家</span>
            </button>
        </div>
    </nav>

    <script>
        // 全局数据存储
        let allData = [];
        let clubsData = [];
        let nationsData = [];
        
        // 分页状态
        const pagination = {
            players: { page: 0, pageSize: 100, hasMore: true, loading: false },
            clubs: { page: 0, pageSize: 10, hasMore: true, loading: false },
            nations: { page: 0, pageSize: 10, hasMore: true, loading: false }
        };
        
        let currentTab = 'home';
        let darkMode = false;
        let activeFilter = 'all';
        let searchTerm = '';
        let headers = [];

        // 属性分类
        const attrCategories = {
            technical: ['角球', '传中', '盘带', '射门', '接球', '任意球', '头球', '远射', '界外球', '盯人', '传球', '罚点球', '抢断', '技术'],
            mental: ['侵略性', '预判', '勇敢', '镇定', '集中', '决断', '意志力', '想象力', '领导力', '无球跑动', '防守站位', '团队合作', '视野', '工作投入'],
            physical: ['爆发力', '灵活', '平衡', '弹跳', '体质', '速度', '耐力', '强壮'],
            goalkeeping: ['制空能力', '拦截传中', '沟通', '神经指数', '手控球', '大脚开球', '一对一', '反应', '出击', '击球倾向', '手抛球的能力']
        };

        // Intersection Observers
        let playersObserver, clubsObserver, nationsObserver;

        function initObservers() {
            playersObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && pagination.players.hasMore && !pagination.players.loading && currentTab === 'players') {
                    loadMorePlayers();
                }
            }, { threshold: 0.1 });
            
            clubsObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && pagination.clubs.hasMore && !pagination.clubs.loading && currentTab === 'clubs') {
                    loadMoreClubs();
                }
            }, { threshold: 0.1 });
            
            nationsObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && pagination.nations.hasMore && !pagination.nations.loading && currentTab === 'nations') {
                    loadMoreNations();
                }
            }, { threshold: 0.1 });
        }

        function getPositionColor(pos) {
            if (!pos) return 'pos-mid';
            const posStr = pos.toUpperCase();
            if (posStr.includes('GK')) return 'pos-gk';
            if (posStr.includes('D') || posStr.includes('WB')) return 'pos-def';
            if (posStr.includes('M') || posStr.includes('AM')) return 'pos-mid';
            if (posStr.includes('ST') || posStr.includes('F')) return 'pos-fwd';
            return 'pos-mid';
        }

        // CSV解析函数
        function parseCSV(csvText) {
            const lines = [];
            let currentLine = '';
            let insideQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        currentLine += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === '\n' && !insideQuotes) {
                    lines.push(currentLine);
                    currentLine = '';
                } else if (char === '\r' && !insideQuotes) {
                    // 忽略回车符
                } else {
                    currentLine += char;
                }
            }
            if (currentLine) lines.push(currentLine);
            
            if (lines.length < 2) return [];
            
            headers = parseCSVLine(lines[0]);
            
            let dataStartIndex = 1;
            const secondLine = parseCSVLine(lines[1]);
            if (secondLine[0] === headers[0]) {
                dataStartIndex = 2;
            }
            
            const data = [];
            for (let i = dataStartIndex; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = parseCSVLine(lines[i]);
                if (values.length < 3) continue;
                
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] !== undefined ? values[index].trim() : '';
                });
                
                row['CA'] = parseInt(row['ca']) || parseInt(row['CA']) || 0;
                row['PA'] = parseInt(row['pa']) || parseInt(row['PA']) || 0;
                row['年龄'] = parseInt(row['年龄']) || 0;
                
                Object.keys(row).forEach(key => {
                    if (!['姓名', 'UID', '国籍', '俱乐部', '位置', '租借俱乐部', '球员习惯', '出生日期'].includes(key)) {
                        const num = parseFloat(row[key]);
                        if (!isNaN(num) && row[key] !== '') {
                            row[key] = num;
                        }
                    }
                });
                
                if (row['姓名'] && row['姓名'].trim() !== '') {
                    data.push(row);
                }
            }
            return data;
        }

        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let insideQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }

        async function loadData() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('homeView').classList.add('hidden');

            try {
                const response = await fetch('https://angreoli-fagioli-garciatest-html.static.hf.space/%E7%90%83%E5%91%98%E5%B1%9E%E6%80%A7%EF%BC%88%E7%AD%9B%E9%80%89%EF%BC%89%20.csv');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const csvText = await response.text();
                allData = parseCSV(csvText);
                
                if (allData.length === 0) throw new Error('No data parsed');
                
                preprocessData();
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('homeView').classList.remove('hidden');
                
                renderHome();
                initObservers();
                observeLoadMore();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.remove('hidden');
            }
        }

        function preprocessData() {
            const clubs = {};
            const nations = {};
            
            allData.forEach(p => {
                const club = p['俱乐部'] || '未知球队';
                const nation = p['国籍'] || '未知国家';
                
                if (!clubs[club]) clubs[club] = [];
                clubs[club].push(p);
                
                if (!nations[nation]) nations[nation] = [];
                nations[nation].push(p);
            });
            
            clubsData = Object.entries(clubs).map(([name, players]) => ({
                name,
                players,
                count: players.length,
                avgAge: (players.reduce((sum, p) => sum + (p['年龄'] || 0), 0) / players.length).toFixed(1),
                avgCA: (players.reduce((sum, p) => sum + (p['CA'] || 0), 0) / players.length).toFixed(1),
                avgPA: (players.reduce((sum, p) => sum + (p['PA'] || 0), 0) / players.length).toFixed(1)
            })).sort((a, b) => b.count - a.count);
            
            nationsData = Object.entries(nations).map(([name, players]) => ({
                name,
                players,
                count: players.length,
                avgAge: (players.reduce((sum, p) => sum + (p['年龄'] || 0), 0) / players.length).toFixed(1),
                avgCA: (players.reduce((sum, p) => sum + (p['CA'] || 0), 0) / players.length).toFixed(1),
                avgPA: (players.reduce((sum, p) => sum + (p['PA'] || 0), 0) / players.length).toFixed(1)
            })).sort((a, b) => b.count - a.count);
        }

        function observeLoadMore() {
            const playersTrigger = document.getElementById('playersLoadMore');
            const clubsTrigger = document.getElementById('clubsLoadMore');
            const nationsTrigger = document.getElementById('nationsLoadMore');
            
            if (playersTrigger) playersObserver.observe(playersTrigger);
            if (clubsTrigger) clubsObserver.observe(clubsTrigger);
            if (nationsTrigger) nationsObserver.observe(nationsTrigger);
        }

        function getFilteredPlayers() {
            let filtered = [...allData];
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => {
                    return (p['姓名'] || '').toLowerCase().includes(term) ||
                           (p['俱乐部'] || '').toLowerCase().includes(term) ||
                           (p['国籍'] || '').toLowerCase().includes(term) ||
                           (p['位置'] || '').toLowerCase().includes(term);
                });
            }
            
            if (activeFilter === 'age') filtered = filtered.filter(p => p['年龄'] <= 25);
            if (activeFilter === 'ca') filtered = filtered.filter(p => p['CA'] >= 150);
            if (activeFilter === 'pa') filtered = filtered.filter(p => p['PA'] >= 170);
            
            return filtered;
        }

        function loadMorePlayers() {
            if (pagination.players.loading || !pagination.players.hasMore) return;
            
            pagination.players.loading = true;
            document.querySelector('#playersLoadMore .loading-spin').classList.remove('hidden');
            
            setTimeout(() => {
                const filtered = getFilteredPlayers();
                const start = pagination.players.page * pagination.players.pageSize;
                const end = start + pagination.players.pageSize;
                const pageData = filtered.slice(start, end);
                
                if (pageData.length > 0) {
                    const html = pageData.map(p => renderPlayerCard(p)).join('');
                    const container = document.getElementById('playersList');
                    
                    if (pagination.players.page === 0) {
                        container.innerHTML = html;
                    } else {
                        container.insertAdjacentHTML('beforeend', html);
                    }
                    
                    pagination.players.page++;
                    pagination.players.hasMore = end < filtered.length;
                    
                    document.getElementById('playerCount').textContent = `显示 ${Math.min(end, filtered.length)} / ${filtered.length} 人`;
                } else {
                    pagination.players.hasMore = false;
                }
                
                pagination.players.loading = false;
                document.querySelector('#playersLoadMore .loading-spin').classList.add('hidden');
                
                if (!pagination.players.hasMore) {
                    document.getElementById('playersLoadMore').innerHTML = '<span class="text-xs text-secondary">已加载全部</span>';
                }
            }, 100);
        }

        function loadMoreClubs() {
            if (pagination.clubs.loading || !pagination.clubs.hasMore) return;
            
            pagination.clubs.loading = true;
            document.querySelector('#clubsLoadMore .loading-spin').classList.remove('hidden');
            
            setTimeout(() => {
                const start = pagination.clubs.page * pagination.clubs.pageSize;
                const end = start + pagination.clubs.pageSize;
                const pageData = clubsData.slice(start, end);
                
                if (pageData.length > 0) {
                    const html = pageData.map(c => renderClubCard(c)).join('');
                    const container = document.getElementById('clubsList');
                    
                    if (pagination.clubs.page === 0) {
                        container.innerHTML = html;
                    } else {
                        container.insertAdjacentHTML('beforeend', html);
                    }
                    
                    pagination.clubs.page++;
                    pagination.clubs.hasMore = end < clubsData.length;
                    
                    document.getElementById('clubCount').textContent = `显示 ${Math.min(end, clubsData.length)} / ${clubsData.length} 队`;
                }
                
                pagination.clubs.loading = false;
                document.querySelector('#clubsLoadMore .loading-spin').classList.add('hidden');
                
                if (!pagination.clubs.hasMore) {
                    document.getElementById('clubsLoadMore').innerHTML = '<span class="text-xs text-secondary">已加载全部</span>';
                }
            }, 100);
        }

        function loadMoreNations() {
            if (pagination.nations.loading || !pagination.nations.hasMore) return;
            
            pagination.nations.loading = true;
            document.querySelector('#nationsLoadMore .loading-spin').classList.remove('hidden');
            
            setTimeout(() => {
                const start = pagination.nations.page * pagination.nations.pageSize;
                const end = start + pagination.nations.pageSize;
                const pageData = nationsData.slice(start, end);
                
                if (pageData.length > 0) {
                    const html = pageData.map(n => renderNationCard(n)).join('');
                    const container = document.getElementById('nationsList');
                    
                    if (pagination.nations.page === 0) {
                        container.innerHTML = html;
                    } else {
                        container.insertAdjacentHTML('beforeend', html);
                    }
                    
                    pagination.nations.page++;
                    pagination.nations.hasMore = end < nationsData.length;
                    
                    document.getElementById('nationCount').textContent = `显示 ${Math.min(end, nationsData.length)} / ${nationsData.length} 个`;
                }
                
                pagination.nations.loading = false;
                document.querySelector('#nationsLoadMore .loading-spin').classList.add('hidden');
                
                if (!pagination.nations.hasMore) {
                    document.getElementById('nationsLoadMore').innerHTML = '<span class="text-xs text-secondary">已加载全部</span>';
                }
            }, 100);
        }

        function resetPagination() {
            pagination.players = { page: 0, pageSize: 100, hasMore: true, loading: false };
            pagination.clubs = { page: 0, pageSize: 10, hasMore: true, loading: false };
            pagination.nations = { page: 0, pageSize: 10, hasMore: true, loading: false };
            
            document.getElementById('playersLoadMore').innerHTML = '<div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin"></div>';
            document.getElementById('clubsLoadMore').innerHTML = '<div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin hidden"></div>';
            document.getElementById('nationsLoadMore').innerHTML = '<div class="w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full loading-spin hidden"></div>';
        }

        function renderPlayerCard(player) {
            const ca = player['CA'] || 0;
            const pa = player['PA'] || 0;
            const age = player['年龄'] || 0;
            const position = player['位置'] || '未知';
            const club = player['俱乐部'] || '未知球队';
            const nation = player['国籍'] || '未知';
            const name = player['姓名'] || '未知';
            
            return `
                <div class="player-card card rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer" onclick="togglePlayerDetail(this)">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between">
                                <div class="min-w-0 flex-1">
                                    <h3 class="font-bold text-base truncate">${name}</h3>
                                    <div class="flex items-center gap-2 mt-1 flex-wrap">
                                        <span class="position-badge ${getPositionColor(position)}">${position}</span>
                                        <span class="text-xs text-secondary truncate max-w-[100px]">${club}</span>
                                        <span class="text-xs text-secondary">${nation}</span>
                                    </div>
                                </div>
                                <div class="text-right flex gap-3 ml-2">
                                    <div class="text-center">
                                        <div class="text-xs text-secondary">CA</div>
                                        <div class="font-bold text-lg ${ca >= 150 ? 'text-green-600 dark:text-green-400' : ''}">${ca}</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-xs text-secondary">PA</div>
                                        <div class="font-bold text-lg ${pa >= 180 ? 'text-purple-600 dark:text-purple-400' : ''}">${pa}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="expandable-content">
                        <div class="pt-4 border-t border-gray-200 dark:border-gray-700 mt-4">
                            <div class="grid grid-cols-3 gap-4 mb-4 text-center">
                                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                                    <div class="text-xs text-secondary">年龄</div>
                                    <div class="font-bold">${age} 岁</div>
                                </div>
                                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                                    <div class="text-xs text-secondary">UID</div>
                                    <div class="font-bold text-xs">${player['UID'] || '-'}</div>
                                </div>
                                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                                    <div class="text-xs text-secondary">身价</div>
                                    <div class="font-bold text-xs truncate">${player['身价（欧元）'] || '-'}</div>
                                </div>
                            </div>
                            
                            ${renderAttributeSection('技术属性', attrCategories.technical, player)}
                            ${renderAttributeSection('精神属性', attrCategories.mental, player)}
                            ${renderAttributeSection('身体属性', attrCategories.physical, player)}
                            ${player['GK'] > 10 ? renderAttributeSection('门将属性', attrCategories.goalkeeping, player) : ''}
                            
                            ${player['球员习惯'] ? `
                                <div class="mt-4 pt-3 border-t border-gray-200 dark:border-gray-700">
                                    <h4 class="text-xs font-bold text-secondary mb-2">球员习惯</h4>
                                    <p class="text-xs text-gray-600 dark:text-gray-400 leading-relaxed">${player['球员习惯']}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderClubCard(club) {
            return `
                <div class="card rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-98 transition" onclick="showClubDetail('${club.name}')">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-base">${club.name}</h3>
                        <span class="text-xs bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-full">${club.count} 人</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均年龄</div>
                            <div class="font-bold text-lg">${club.avgAge}</div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均CA</div>
                            <div class="font-bold text-lg text-green-600">${club.avgCA}</div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均PA</div>
                            <div class="font-bold text-lg text-purple-600">${club.avgPA}</div>
                        </div>
                    </div>
                    <div class="mt-3 text-center text-xs text-green-600">点击查看球员名单</div>
                </div>
            `;
        }

        function renderNationCard(nation) {
            return `
                <div class="card rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-98 transition" onclick="showNationDetail('${nation.name}')">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-base">${nation.name}</h3>
                        <span class="text-xs bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-full">${nation.count} 人</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均年龄</div>
                            <div class="font-bold text-lg">${nation.avgAge}</div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均CA</div>
                            <div class="font-bold text-lg text-green-600">${nation.avgCA}</div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
                            <div class="text-xs text-secondary">平均PA</div>
                            <div class="font-bold text-lg text-purple-600">${nation.avgPA}</div>
                        </div>
                    </div>
                    <div class="mt-3 text-center text-xs text-green-600">点击查看球员名单</div>
                </div>
            `;
        }

        function renderAttributeSection(title, attrs, player) {
            const validAttrs = attrs.filter(attr => {
                const val = player[attr];
                return val !== undefined && val !== '' && !isNaN(val) && val > 0;
            });
            
            if (validAttrs.length === 0) return '';
            
            return `
                <div class="mb-3">
                    <h4 class="text-xs font-bold text-secondary mb-2 uppercase tracking-wider">${title}</h4>
                    <div class="stat-grid">
                        ${validAttrs.map(attr => {
                            const val = player[attr];
                            let className = 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400';
                            if (val >= 15) className = 'skill-higher';
                            else if (val > 10) className = 'skill-high';
                            return `<div class="text-center p-1.5 rounded text-xs ${className}">
                                <div class="opacity-80 truncate">${attr}</div>
                                <div class="font-bold text-sm">${val}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function togglePlayerDetail(element) {
            const content = element.querySelector('.expandable-content');
            const isExpanded = content.classList.contains('expanded');
            
            document.querySelectorAll('.expandable-content.expanded').forEach(el => {
                if (el !== content) el.classList.remove('expanded');
            });
            
            content.classList.toggle('expanded');
        }

        function showClubDetail(clubName) {
            const club = clubsData.find(c => c.name === clubName);
            if (!club) return;
            
            document.getElementById('modalTitle').textContent = club.name;
            const playersHtml = club.players.map(p => renderPlayerCard(p)).join('');
            
            document.getElementById('modalBody').innerHTML = `
                <div class="grid grid-cols-3 gap-2 mb-4 text-center">
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">球员总数</div>
                        <div class="font-bold text-xl">${club.count}</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">平均CA</div>
                        <div class="font-bold text-xl text-green-600">${club.avgCA}</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">平均PA</div>
                        <div class="font-bold text-xl text-purple-600">${club.avgPA}</div>
                    </div>
                </div>
                <h3 class="font-bold mb-2">球员名单</h3>
                <div class="space-y-2">${playersHtml}</div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function showNationDetail(nationName) {
            const nation = nationsData.find(n => n.name === nationName);
            if (!nation) return;
            
            document.getElementById('modalTitle').textContent = nation.name;
            const playersHtml = nation.players.map(p => renderPlayerCard(p)).join('');
            
            document.getElementById('modalBody').innerHTML = `
                <div class="grid grid-cols-3 gap-2 mb-4 text-center">
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">球员总数</div>
                        <div class="font-bold text-xl">${nation.count}</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">平均CA</div>
                        <div class="font-bold text-xl text-green-600">${nation.avgCA}</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
                        <div class="text-xs text-secondary">平均PA</div>
                        <div class="font-bold text-xl text-purple-600">${nation.avgPA}</div>
                    </div>
                </div>
                <h3 class="font-bold mb-2">球员名单</h3>
                <div class="space-y-2">${playersHtml}</div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('detailModal')) return;
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderHome() {
            const caTop = [...allData].sort((a, b) => b['CA'] - a['CA']).slice(0, 20);
            const paTop = [...allData].sort((a, b) => b['PA'] - a['PA']).slice(0, 20);
            
            document.getElementById('caTop20').innerHTML = caTop.map((p, i) => {
                const rankBadge = `<span class="w-6 h-6 rounded-full ${i < 3 ? 'bg-yellow-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400'} flex items-center justify-center text-xs font-bold mr-2">${i + 1}</span>`;
                return renderPlayerCard(p).replace('<div class="flex items-center gap-3">', `<div class="flex items-center gap-3">${rankBadge}`);
            }).join('');
            
            document.getElementById('paTop20').innerHTML = paTop.map((p, i) => {
                const rankBadge = `<span class="w-6 h-6 rounded-full ${i < 3 ? 'bg-yellow-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400'} flex items-center justify-center text-xs font-bold mr-2">${i + 1}</span>`;
                return renderPlayerCard(p).replace('<div class="flex items-center gap-3">', `<div class="flex items-center gap-3">${rankBadge}`);
            }).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.classList.add('nav-active', 'text-green-600');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('nav-active', 'text-green-600');
                    btn.classList.add('text-gray-400');
                }
            });
            
            document.querySelectorAll('#mainContent > div[id$="View"]').forEach(view => {
                view.classList.add('hidden');
            });
            document.getElementById(tab + 'View').classList.remove('hidden');
            
            if (tab === 'players' && pagination.players.page === 0) loadMorePlayers();
            else if (tab === 'clubs' && pagination.clubs.page === 0) loadMoreClubs();
            else if (tab === 'nations' && pagination.nations.page === 0) loadMoreNations();
        }

        function toggleTheme() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            
            const icon = document.getElementById('theme-icon');
            if (darkMode) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }

        function toggleFilter(filter) {
            activeFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('bg-green-500', 'text-white');
                    btn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gray-300');
                } else {
                    btn.classList.remove('bg-green-500', 'text-white');
                    btn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gray-300');
                }
            });
            
            if (currentTab === 'players') {
                resetPagination();
                document.getElementById('playersList').innerHTML = '';
                loadMorePlayers();
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            if (currentTab === 'players') {
                resetPagination();
                document.getElementById('playersList').innerHTML = '';
                loadMorePlayers();
            } else if (currentTab === 'home' && searchTerm) {
                switchTab('players');
            }
        });

        loadData();
        initObservers();
        
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleTheme();
        }
    </script>
</body>
</html>
