<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加西亚竞猜中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .hidden { display: none !important; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; -ms-overflow-style: none; }
        
        .dg-green { background-color: #1a9e5f; }
        .dg-dark { background-color: #1e1e1e; }
        
        .match-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border: 1px solid #333;
        }
        
        .btn-guess {
            background: linear-gradient(135deg, #1a9e5f 0%, #158f54 100%);
            box-shadow: 0 2px 8px rgba(26, 158, 95, 0.3);
        }
        
        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .team-logo-placeholder {
            background: linear-gradient(135deg, #444 0%, #333 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }
        
        .admin-btn {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
        }
        
        .schema-cache-error {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            color: #92400e;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>

            </div>
            
            <div class="space-y-4">

                    onkeypress="handleKeyPress(event)">

                    class="w-full dg-green text-white font-bold py-3 rounded-xl transition active:scale-95 shadow-lg">
                    <span id="btnText">立即登录</span>
                </button>
                
                <div id="loginError" class="text-red-500 text-sm text-center hidden bg-red-50 p-3 rounded-lg"></div>
            </div>
        </div>
    </div>

                    <div class="flex bg-gray-800 rounded-lg p-0.5">
                        <button onclick="switchTab('matches')" id="tab-matches" class="px-3 py-1.5 rounded-md text-xs font-medium bg-green-600 text-white transition">比赛</button>

                            <option value="-1">主-1</option>

                    </div>

        let currentUser = null;
        let supabaseClient = null;
        let matches = [];
        let guesses = [];
        let userStats = [];

        window.onload = function() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    showMainApp();
                } catch(e) {
                    localStorage.removeItem('currentUser');
                }
            }
        };

        function doLogin() {
            const input = document.getElementById('loginCodeInput');
            const btn = document.getElementById('loginBtn');
            const code = input.value.trim().toUpperCase();
            
            if (!code) {
                showLoginError('请输入登录码');
                return;
            }

            btn.disabled = true;
            document.getElementById('btnText').textContent = '登录中...';
            
            const userInfo = USER_CODES[code];
            if (userInfo) {
                currentUser = { code: code, ...userInfo };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showMainApp();
            } else {
                showLoginError('登录码错误');
                btn.disabled = false;
                document.getElementById('btnText').textContent = '立即登录';
                input.value = '';
                input.focus();
            }
        }

        function showLoginError(msg) {
            const error = document.getElementById('loginError');
            error.textContent = msg;
            error.classList.remove('hidden');
            setTimeout(() => error.classList.add('hidden'), 3000);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') doLogin();
        }

        function showMainApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('navUsername').textContent = currentUser.username;
            document.getElementById('navAvatar').src = currentUser.avatar;
            document.getElementById('navPoints').textContent = '--';
            
            if (currentUser.type === '管理员') {
                document.getElementById('adminCreatePanel').classList.remove('hidden');
                document.getElementById('resetPointsBtn').classList.remove('hidden');
            }
            
            initSupabase();
            loadAllData();
            setInterval(loadAllData, 30000);
            setInterval(checkAutoEndMatches, 60000);
        }

        async function checkAutoEndMatches() {
            if (!supabaseClient) return;
            
            const now = new Date();
            const matchesToEnd = matches.filter(m => {
                if (m.status === 'finished') return false;
                const matchTime = new Date(m.match_time);
                const endTime = new Date(matchTime.getTime() + 95 * 60000);
                return now >= endTime;
            });

            for (const match of matchesToEnd) {
                try {
                    await supabaseClient.from('matches').update({
                        status: 'finished'
                    }).eq('id', match.id);
                } catch(err) {
                    console.error('自动结束失败:', err);
                }
            }
            
            if (matchesToEnd.length > 0) loadAllData();
        }

        async function loadAllData() {
            if (!supabaseClient) {
                document.getElementById('connStatus').textContent = '离线';
                document.getElementById('connStatus').className = 'text-[10px] px-1.5 py-0.5 rounded bg-red-900 text-red-300 ml-2';
                return;
            }

            document.getElementById('connStatus').textContent = '同步中';
            
            try {
                const [mRes, gRes, sRes] = await Promise.all([
                    supabaseClient.from('matches').select('*').order('match_time', {ascending: false}),
                    supabaseClient.from('guesses').select('*'),
                    supabaseClient.from('user_stats').select('*')
                ]);

                if (mRes.error) throw mRes.error;
                if (gRes.error) throw gRes.error;
                if (sRes.error) throw sRes.error;

                matches = mRes.data || [];
                guesses = gRes.data || [];
                userStats = sRes.data || [];
                
                document.getElementById('connStatus').textContent = '已连接';
                document.getElementById('connStatus').className = 'text-[10px] px-1.5 py-0.5 rounded bg-green-900 text-green-300 ml-2';
                
                renderMatches();
                updateUserPoints();
                checkAutoEndMatches();
                
            } catch(err) {
                document.getElementById('connStatus').textContent = '失败';
                document.getElementById('connStatus').className = 'text-[10px] px-1.5 py-0.5 rounded bg-red-900 text-red-300 ml-2';
            }
        }

            if (!container) return;
            
            if (matches.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500 text-sm">暂无比赛</div>';
                return;
            }

            const now = new Date();
            container.innerHTML = matches.map(match => {
                const matchTime = new Date(match.match_time);
                const isStarted = now >= matchTime;
                const isEnded = match.status === 'finished';
                const hasScore = match.home_score !== null && match.home_score !== undefined && 
                                match.away_score !== null && match.away_score !== undefined;
                const userGuess = guesses.find(g => g.match_id === match.id && g.user_code === currentUser.code);
                
                let statusClass = '';
                let statusText = '';
                if (isEnded && hasScore) {
                    statusClass = 'bg-gray-600 text-gray-200';
                    statusText = '已结束';
                } else if (isEnded && !hasScore) {
                    statusClass = 'bg-orange-600 text-white';
                    statusText = '待结算';
                } else if (isStarted) {
                    statusClass = 'bg-red-600 text-white';
                    statusText = '进行中';
                } else {

                    statusText = '未开始';

                    centerContent = `<div class="text-2xl font-bold text-white tracking-wider">${match.home_score} - ${match.away_score}</div>`;
                } else {
                    centerContent = `<div class="text-lg font-bold text-gray-500">VS</div>`;
                }

                const handicapText = match.handicap ? 
                    `<span class="text-[10px] text-orange-400 border border-orange-400/30 px-1.5 py-0.5 rounded">${match.handicap > 0 ? '客让'+match.handicap : '主让'+Math.abs(match.handicap)}</span>` : '';

                let actionArea = '';

                    actionArea = `
                        <div class="grid grid-cols-3 gap-2 mt-3 pt-3 border-t border-gray-700">

                            <button onclick="event.stopPropagation(); submitGuess(${match.id}, 'lose')" class="bg-red-600 text-white py-2 rounded-lg text-sm font-bold active:scale-95 transition shadow-lg shadow-red-900/30">客胜</button>

                    const resultColor = userGuess.prediction === 'win' ? 'text-green-400' : userGuess.prediction === 'draw' ? 'text-gray-400' : 'text-red-400';
                    actionArea = `<div class="mt-3 pt-3 border-t border-gray-700 text-center text-sm ${resultColor} font-medium">已竞猜：${resultText}</div>`;
                } else if (isStarted && !isEnded) {

                } else if (isEnded && !hasScore) {

        // 新增：删除比赛功能
        async function deleteMatch(matchId) {
            if (!confirm('确定要删除这场比赛吗？这将同时删除所有相关竞猜记录，此操作不可恢复。')) return;
            if (!supabaseClient) return;
            
            try {
                // 先删除相关竞猜记录（避免外键约束错误）
                const { error: guessError } = await supabaseClient
                    .from('guesses')
                    .delete()
                    .eq('match_id', matchId);
                
                if (guessError) throw guessError;
                
                // 再删除比赛
                const { error: matchError } = await supabaseClient
                    .from('matches')
                    .delete()
                    .eq('id', matchId);
                
                if (matchError) throw matchError;
                
                alert('比赛已删除');
                loadAllData();
            } catch(err) {
                alert('删除失败: ' + err.message);
            }
        }

        async function editMatchTime(matchId) {
            const match = matches.find(m => m.id === matchId);
            const currentTime = new Date(match.match_time);
            const timeStr = new Date(currentTime.getTime() - (currentTime.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            
            const newTime = prompt('修改比赛时间:', timeStr.replace('T', ' '));
            if (!newTime) return;
            
            try {
                const dateObj = new Date(newTime);
                if (isNaN(dateObj.getTime())) {
                    alert('时间格式错误');
                    return;
                }
                
                const { error } = await supabaseClient.from('matches').update({
                    match_time: dateObj.toISOString()
                }).eq('id', matchId);
                
                if (error) throw error;
                loadAllData();
            } catch(err) {
                alert('修改失败: ' + err.message);
            }
        }

        async function manualEndMatch(matchId) {
            if (!confirm('确定要手动结束这场比赛吗？')) return;
            
            try {
                const { error } = await supabaseClient.from('matches').update({

        // 修复后的结算函数 - 关键修复：添加 username 字段
        async function showSettle(matchId) {
            const match = matches.find(m => m.id === matchId);
            
            const homeScoreStr = prompt(`${match.home_team} 进球数:`);
            if (homeScoreStr === null) return;
            const awayScoreStr = prompt(`${match.away_team} 进球数:`);
            if (awayScoreStr === null) return;
            
            const homeScore = parseInt(homeScoreStr);
            const awayScore = parseInt(awayScoreStr);
            
            if (isNaN(homeScore) || isNaN(awayScore)) {
                alert('请输入有效的数字比分');
                return;
            }

            // 显示结算中提示
            const settlingMsg = document.createElement('div');
            settlingMsg.className = 'fixed inset-0 bg-black/80 z-[60] flex items-center justify-center text-white';
            settlingMsg.innerHTML = '<div class="text-center"><div class="inline-block w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div><p>正在结算...</p></div>';
            document.body.appendChild(settlingMsg);

            try {
                // 1. 计算让球后的结果
                let adjustedHome = homeScore;
                let adjustedAway = awayScore;
                
                if (match.handicap) {
                    const handicap = parseFloat(match.handicap);
                    if (handicap < 0) {
                        adjustedHome = homeScore + handicap;
                    } else {
                        adjustedAway = awayScore - handicap;
                    }
                }

                // 确定比赛结果
                let result;
                if (adjustedHome > adjustedAway) result = 'win';
                else if (adjustedHome === adjustedAway) result = 'draw';
                else result = 'lose';

                console.log(`[结算] 比赛ID: ${matchId}, 比分: ${homeScore}-${awayScore}, 让球: ${match.handicap || '无'}, 结果: ${result}`);

                // 2. 先更新比赛状态和比分
                const { error: updateError } = await supabaseClient
                    .from('matches')
                    .update({
                        status: 'finished',
                        home_score: homeScore,
                        away_score: awayScore
                    })
                    .eq('id', matchId);

                if (updateError) {
                    if (updateError.message && updateError.message.includes('schema cache')) {
                        throw new Error('SCHEMA_CACHE_ERROR');
                    }
                    throw updateError;
                }
                console.log('[结算] 比赛状态更新成功');

                // 3. 从数据库重新查询这场比赛的所有竞猜
                const { data: matchGuesses, error: guessQueryError } = await supabaseClient
                    .from('guesses')
                    .select('*')
                    .eq('match_id', parseInt(matchId));

                if (guessQueryError) {
                    if (guessQueryError.message && guessQueryError.message.includes('schema cache')) {
                        throw new Error('SCHEMA_CACHE_ERROR');
                    }
                    throw new Error('查询竞猜记录失败: ' + guessQueryError.message);
                }

                console.log(`[结算] 找到竞猜记录:`, matchGuesses);

                // 4. 逐个结算用户竞猜
                let successCount = 0;
                let failCount = 0;
                let failReasons = [];
                let hasSchemaCacheError = false;
                
                if (matchGuesses && matchGuesses.length > 0) {
                    for (const guess of matchGuesses) {
                        try {
                            console.log(`[结算] 处理用户: ${guess.user_code}, 预测: ${guess.prediction}`);
                            
                            const isCorrect = guess.prediction === result;
                            const points = isCorrect ? 10 : -10;
                            
                            // 获取用户信息
                            const userInfo = USER_CODES[guess.user_code];
                            const username = userInfo ? userInfo.username : guess.user_code;
                            
                            // 查询用户现有统计
                            const { data: existingStats, error: statQueryError } = await supabaseClient
                                .from('user_stats')
                                .select('*')
                                .eq('user_code', guess.user_code);
                            
                            if (statQueryError) {
                                if (statQueryError.message && statQueryError.message.includes('schema cache')) {
                                    hasSchemaCacheError = true;
                                    failCount++;
                                    failReasons.push(`${guess.user_code}: 数据库结构缓存错误`);
                                    continue;
                                }
                                console.error(`[结算] 查询用户 ${guess.user_code} 统计失败:`, statQueryError);
                                failCount++;
                                failReasons.push(`${guess.user_code}: 查询统计失败`);
                                continue;
                            }

                            const existingStat = existingStats && existingStats.length > 0 ? existingStats[0] : null;

                            if (existingStat) {
                                // 更新现有记录
                                const newTotalGuesses = parseInt(existingStat.total_guesses || 0) + 1;
                                const newCorrectGuesses = parseInt(existingStat.correct_guesses || 0) + (isCorrect ? 1 : 0);
                                const newTotalPoints = parseInt(existingStat.total_points || 0) + points;

                                console.log(`[结算] 更新用户 ${guess.user_code}: ${existingStat.total_points} -> ${newTotalPoints}`);

                                const { error: updateStatError } = await supabaseClient
                                    .from('user_stats')
                                    .update({
                                        total_guesses: newTotalGuesses,
                                        correct_guesses: newCorrectGuesses,
                                        total_points: newTotalPoints,
                                        username: existingStat.username || username // 确保 username 存在
                                    })
                                    .eq('user_code', guess.user_code);

                                if (updateStatError) {
                                    if (updateStatError.message && updateStatError.message.includes('schema cache')) {
                                        hasSchemaCacheError = true;
                                        failCount++;
                                        failReasons.push(`${guess.user_code}: 数据库结构缓存错误`);
                                        continue;
                                    }
                                    console.error(`[结算] 更新用户 ${guess.user_code} 统计失败:`, updateStatError);
                                    failCount++;
                                    failReasons.push(`${guess.user_code}: ${updateStatError.message}`);
                                } else {
                                    console.log(`[结算] 更新用户 ${guess.user_code} 成功`);
                                    successCount++;
                                }
                            } else {
                                // 创建新记录 - 关键修复：添加 username 字段
                                console.log(`[结算] 创建用户 ${guess.user_code} 统计`);
                                
                                const { error: insertStatError } = await supabaseClient
                                    .from('user_stats')
                                    .insert({
                                        user_code: guess.user_code,
                                        username: username, // 添加 username
                                        total_guesses: 1,
                                        correct_guesses: isCorrect ? 1 : 0,
                                        total_points: points
                                    });

                                if (insertStatError) {
                                    if (insertStatError.message && insertStatError.message.includes('schema cache')) {
                                        hasSchemaCacheError = true;
                                        failCount++;
                                        failReasons.push(`${guess.user_code}: 数据库结构缓存错误`);
                                        continue;
                                    }
                                    console.error(`[结算] 创建用户 ${guess.user_code} 统计失败:`, insertStatError);
                                    failCount++;
                                    failReasons.push(`${guess.user_code}: ${insertStatError.message}`);
                                } else {
                                    console.log(`[结算] 创建用户 ${guess.user_code} 统计成功`);
                                    successCount++;
                                }
                            }
                        } catch (guessError) {
                            if (guessError.message && guessError.message.includes('schema cache')) {
                                hasSchemaCacheError = true;
                                failCount++;
                                failReasons.push(`${guess.user_code}: 数据库结构缓存错误`);
                            } else {
                                console.error(`[结算] 处理用户 ${guess.user_code} 时出错:`, guessError);
                                failCount++;
                                failReasons.push(`${guess.user_code}: ${guessError.message}`);
                            }
                        }
                    }
                } else {
                    console.log('[结算] 本场比赛无人竞猜');
                }

                // 5. 刷新数据
                console.log('[结算] 刷新数据...');
                await loadAllData();
                
                // 移除结算提示
                document.body.removeChild(settlingMsg);
                
                let msg = `结算完成！\n${match.home_team} ${homeScore} - ${awayScore} ${match.away_team}\n结果：${result === 'win' ? '主胜' : result === 'draw' ? '平局' : '客胜'}\n\n`;
                if (matchGuesses && matchGuesses.length > 0) {
                    msg += `成功: ${successCount}人\n失败: ${failCount}人`;
                    if (failReasons.length > 0) {
                        msg += `\n\n失败详情:\n${failReasons.join('\n')}`;
                    }
                } else {
                    msg += '本场比赛无人竞猜';
                }
                
                // 如果有 Schema Cache 错误，添加特别说明
                if (hasSchemaCacheError) {
                    msg += `\n\n⚠️ 检测到数据库结构未同步，请刷新页面后重试结算操作。`;
                    setTimeout(() => {
                        alert('检测到数据库结构缓存问题。\n\n请执行以下操作：\n1. 刷新当前页面（按 F5 或下拉刷新）\n2. 重新点击"录比分"进行结算\n\n如果仍有问题，请在 Supabase Dashboard 中点击 "Project Settings" -> "API" -> "Restart PostgREST" 或等待 1-2 分钟后再试。');
                    }, 100);
                }
                
                alert(msg);
                
            } catch(err) {
                if (document.body.contains(settlingMsg)) {
                    document.body.removeChild(settlingMsg);
                }
                console.error('[结算] 错误:', err);
                
                if (err.message === 'SCHEMA_CACHE_ERROR' || (err.message && err.message.includes('schema cache'))) {
                    alert('结算失败：数据库结构未同步\n\n请在 Supabase Dashboard 中执行以下操作：\n1. 进入 "Database" -> "Tables"\n2. 确认 user_stats 表包含以下字段：\n   - user_code (text)\n   - username (text)\n   - total_guesses (integer)\n   - correct_guesses (integer)\n   - total_points (integer)\n3. 点击 "Project Settings" -> "API" -> "Restart PostgREST"\n4. 刷新本页面后重试\n\n或者等待 2-3 分钟后刷新页面，让缓存自动更新。');
                } else {
                    alert('结算失败: ' + err.message);
                }
            }
        }

                        </div>
                        <div class="px-4">
                            ${isEnded && hasScore ? `<div class="text-3xl font-bold text-green-600">${match.home_score} - ${match.away_score}</div>` : '<div class="text-2xl font-bold text-gray-400">VS</div>'}
                        </div>
                        <div class="flex-1">
                            <div class="w-16 h-16 rounded-full bg-gray-700 mx-auto mb-2 flex items-center justify-center text-xs text-gray-500">客队</div>
                            <div class="font-bold text-lg">${match.away_team}</div>
                        </div>
                    </div>
                    <div class="text-sm text-gray-500">${match.category} · ${match.league}</div>
                    <div class="text-sm text-gray-400 mt-1">${new Date(match.match_time).toLocaleString('zh-CN')}</div>
                </div>
            `;
            
            if (currentUser.type === '管理员' && !hasScore) {
                html += `<div class="flex gap-2 mb-6 justify-center flex-wrap">`;
                if (!isEnded) {
                    html += `<button onclick="editMatchTime(${match.id}); closeSheet();" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">修改时间</button>`;
                    html += `<button onclick="manualEndMatch(${match.id}); closeSheet();" class="px-4 py-2 bg-orange-600 text-white rounded-lg text-sm">手动结束</button>`;
                }
                html += `<button onclick="showSettle(${match.id}); closeSheet();" class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm">录入比分</button>`;
                html += `<button onclick="deleteMatch(${match.id}); closeSheet();" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">删除比赛</button>`;
                html += `</div>`;
            }
            
            html += `<div class="space-y-3">
                <h4 class="font-bold text-sm text-gray-400 uppercase tracking-wider">竞猜用户 (${matchGuesses.length})</h4>
            `;
            
            if (matchGuesses.length === 0) {
                html += '<div class="text-center text-gray-500 py-4 text-sm">暂无竞猜</div>';
            } else {
                matchGuesses.forEach(g => {
                    const stat = userStats.find(s => s.user_code === g.user_code);
                    const acc = stat && stat.total_guesses > 0 ? (stat.correct_guesses/stat.total_guesses*100).toFixed(0) : 0;
                    const user = USER_CODES[g.user_code];
                    html += `
                        <div class="flex items-center justify-between py-2 border-b border-gray-200 dark:border-gray-700">
                            <div class="flex items-center">
                                <img src="${user?.avatar || ''}" class="w-8 h-8 rounded-full mr-3 bg-gray-200">
                                <span class="text-sm">${user?.username || g.user_code}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs ${g.prediction === 'win' ? 'text-green-600' : g.prediction === 'draw' ? 'text-gray-500' : 'text-red-600'}">
                                    ${g.prediction === 'win' ? '主胜' : g.prediction === 'draw' ? '平局' : '客胜'}
                                </span>
                                <span class="text-xs text-gray-400 w-12 text-right">${acc}%</span>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            
            document.getElementById('sheetContent').innerHTML = html;
            document.getElementById('bottomSheet').classList.remove('hidden');
        }

        function closeSheet() {
            document.getElementById('bottomSheet').classList.add('hidden');
        }

        function renderRanking() {
            const container = document.getElementById('rankingList');
            if (!userStats.length) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500 text-sm">暂无数据</div>';
                return;
            }
            
            const sorted = [...userStats].sort((a,b) => b.total_points - a.total_points);
            container.innerHTML = sorted.map((stat, idx) => {
                const user = USER_CODES[stat.user_code];
                const acc = stat.total_guesses > 0 ? (stat.correct_guesses/stat.total_guesses*100).toFixed(1) : 0;
                return `
                    <div class="flex items-center justify-between p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full ${idx < 3 ? 'bg-yellow-500 text-white' : 'bg-gray-200 text-gray-600'} flex items-center justify-center text-xs font-bold">
                                ${idx + 1}
                            </div>
                            <img src="${user?.avatar || ''}" class="w-10 h-10 rounded-full bg-gray-200">
                            <div>
                                <div class="font-bold text-sm">${user?.username || stat.user_code}</div>
                                <div class="text-xs text-gray-500">${stat.total_guesses}场 ${acc}%</div>
                            </div>
                        </div>
                        <div class="font-bold ${stat.total_points >= 0 ? 'text-green-600' : 'text-red-600'}">
                            ${stat.total_points > 0 ? '+' : ''}${stat.total_points}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateUserPoints() {
            if (currentUser.type === '管理员') return;
            const stat = userStats.find(s => s.user_code === currentUser.code);
            document.getElementById('navPoints').textContent = stat ? stat.total_points : '0';
        }

        async function resetAllPoints() {
            if (!confirm('确定清零所有积分？')) return;
            if (!supabaseClient) return;
            
            try {
                for (const stat of userStats) {
                    await supabaseClient.from('user_stats').update({total_points: 0}).eq('user_code', stat.user_code);
                }
                loadAllData();
            } catch(err) {
                alert('操作失败');
            }
        }

        function doLogout() {
            if (!confirm('确定要退出登录吗？')) return;
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
</html>
