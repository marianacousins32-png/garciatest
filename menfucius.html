    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加西亚竞猜中心</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(0, 0, 0, 0.3); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- 登录界面 -->
    <div id="loginPage" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <h1 class="text-3xl font-bold text-center mb-2 text-gray-800 dark:text-white">加西亚竞猜中心</h1>
            <p class="text-gray-500 dark:text-gray-400 text-center mb-8">请输入登录码参与竞猜</p>
            
            <div class="space-y-4">
                <input type="text" id="loginCode" placeholder="输入登录码（如：OFC2016）" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                <button onclick="handleLogin()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 transform hover:scale-105">
                    登录
                </button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">登录码错误</p>
            </div>
            
            <div class="mt-6 text-center text-xs text-gray-400">
                管理员码：OFC2016 | 用户码见列表
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="app" class="hidden min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <nav class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                            加西亚竞猜
                        </h1>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <button onclick="showPage('matches')" id="nav-matches" class="nav-btn px-3 py-2 rounded-lg text-sm font-medium text-blue-600 bg-blue-50 dark:bg-blue-900/20">
                            比赛中心
                        </button>
                        <button onclick="showPage('ranking')" id="nav-ranking" class="nav-btn px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-white">
                            红黑榜
                        </button>
                        
                        <div class="flex items-center space-x-2 pl-4 border-l border-gray-200 dark:border-gray-700">
                            <img id="userAvatar" src="" alt="" class="w-8 h-8 rounded-full object-cover border-2 border-blue-500">
                            <div class="hidden sm:block">
                                <p id="userName" class="text-sm font-medium text-gray-900 dark:text-white"></p>
                                <p id="userPoints" class="text-xs text-gray-500">积分: --</p>
                            </div>
                            <button onclick="logout()" class="ml-2 text-xs text-red-500 hover:text-red-700">退出</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

                        创建新比赛

                            <option value="其他">其他</option>

                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                        <input type="datetime-local" id="matchTime" class="px-4 py-2 rounded-lg text-gray-900 dark:text-white bg-white dark:bg-gray-700 border-0 focus:ring-2 focus:ring-white">
                        <select id="matchHandicap" class="hidden px-4 py-2 rounded-lg text-gray-900 dark:text-white bg-white dark:bg-gray-700 border-0 focus:ring-2 focus:ring-white">
                            <option value="">不让球</option>
                            <option value="-0.5">主让0.5</option>
                            <option value="-1">主让1</option>
                            <option value="-1.5">主让1.5</option>
                            <option value="-2">主让2</option>
                            <option value="-2.5">主让2.5</option>
                            <option value="-3">主让3</option>
                            <option value="0.5">客让0.5</option>
                            <option value="1">客让1</option>
                            <option value="1.5">客让1.5</option>
                            <option value="2">客让2</option>
                            <option value="2.5">客让2.5</option>
                            <option value="3">客让3</option>
                        </select>

                            生成比赛
                        </button>
                    </div>
                </div>

                <!-- 比赛列表 -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="matchesList">
                    <!-- 动态生成 -->
                </div>
            </div>

                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">总场次</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">猜对率</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">总积分</th>
                                </tr>
                            </thead>
                            <tbody id="rankingList" class="divide-y divide-gray-200 dark:divide-gray-700">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

        // 初始化
        function init() {
            const savedUser = localStorage.getItem('garciaGuessUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showApp();
            }
        }

        function handleLogin() {
            const code = document.getElementById('loginCode').value.trim().toUpperCase();
            if (LOGIN_CODES[code]) {
                currentUser = { code, ...LOGIN_CODES[code] };
                localStorage.setItem('garciaGuessUser', JSON.stringify(currentUser));
                showApp();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('garciaGuessUser');
            location.reload();
        }

        function showApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            document.getElementById('userAvatar').src = currentUser.avatar;
            document.getElementById('userName').textContent = currentUser.username;
            
            if (currentUser.type === '管理员') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminResetBtn').classList.remove('hidden');
            }
            
            loadData();
            setInterval(loadData, 30000); // 每30秒刷新
        }

        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/20');
                el.classList.add('text-gray-600', 'dark:text-gray-300');
            });
            
            const activeBtn = document.getElementById(`nav-${page}`);
            activeBtn.classList.remove('text-gray-600', 'dark:text-gray-300');
            activeBtn.classList.add('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/20');
            
            if (page === 'ranking') loadRanking();
        }

        // 数据加载
        async function loadData() {
            await Promise.all([loadMatches(), loadGuesses(), loadUserStats()]);
            renderMatches();
            updateUserPoints();
        }

        async function loadMatches() {
            const { data, error } = await supabase.from('matches').select('*').order('match_time', { ascending: false });
            if (error) { console.error(error); return; }
            matchesData = data || [];
        }

        async function loadGuesses() {
            const { data, error } = await supabase.from('guesses').select('*');
            if (error) { console.error(error); return; }
            guessesData = data || [];
        }

        async function loadUserStats() {
            const { data, error } = await supabase.from('user_stats').select('*');
            if (error) { console.error(error); return; }
            userStatsData = data || [];
        }

        function toggleHandicap() {
            const cat = document.getElementById('matchCategory').value;
            const handicap = document.getElementById('matchHandicap');
            if (cat === '足球') {
                handicap.classList.remove('hidden');
            } else {
                handicap.classList.add('hidden');
                handicap.value = '';
            }
        }

        // 创建比赛
        async function createMatch() {
            const category = document.getElementById('matchCategory').value;
            const league = document.getElementById('matchLeague').value.trim();
            const home = document.getElementById('matchHome').value.trim();
            const away = document.getElementById('matchAway').value.trim();
            const time = document.getElementById('matchTime').value;
            const handicap = document.getElementById('matchHandicap').value || null;

            if (!category || !league || !home || !away || !time) {
                alert('请填写完整信息');
                return;
            }

            const { error } = await supabase.from('matches').insert({
                category,
                league,
                home_team: home,
                away_team: away,
                match_time: new Date(time).toISOString(),
                handicap,
                status: 'upcoming',
                created_by: currentUser.code
            });

            if (error) {
                alert('创建失败：' + error.message);
            } else {
                alert('比赛创建成功！');
                document.getElementById('matchCategory').value = '';
                document.getElementById('matchLeague').value = '';
                document.getElementById('matchHome').value = '';
                document.getElementById('matchAway').value = '';
                document.getElementById('matchTime').value = '';
                document.getElementById('matchHandicap').value = '';
                loadData();
            }
        }

        // 渲染比赛列表
        function renderMatches() {
            const container = document.getElementById('matchesList');
            container.innerHTML = '';
            
            const now = new Date();
            
            matchesData.forEach(match => {
                const matchTime = new Date(match.match_time);
                const isStarted = now >= matchTime;
                const isEnded = match.status === 'finished';
                const userGuess = guessesData.find(g => g.match_id === match.id && g.user_code === currentUser.code);
                
                let statusBadge = '';
                if (isEnded) {
                    statusBadge = '<span class="px-2 py-1 bg-gray-500 text-white text-xs rounded">已结束</span>';
                } else if (isStarted) {
                    statusBadge = '<span class="px-2 py-1 bg-red-500 text-white text-xs rounded">进行中</span>';
                } else {
                    statusBadge = '<span class="px-2 py-1 bg-green-500 text-white text-xs rounded">未开始</span>';
                }

                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 hover:shadow-xl transition cursor-pointer';
                card.onclick = () => showMatchDetail(match.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-xs font-medium text-gray-500 dark:text-gray-400">${match.category}</span>
                            <span class="text-xs text-gray-400">|</span>
                            <span class="text-xs font-medium text-blue-600 dark:text-blue-400">${match.league}</span>
                        </div>
                        ${statusBadge}
                    </div>
                    
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-center flex-1">
                            <div class="text-lg font-bold text-gray-900 dark:text-white mb-1">${match.home_team}</div>
                            <div class="text-xs text-gray-500">主队</div>
                        </div>
                        <div class="px-4 text-center">
                            <div class="text-2xl font-bold text-gray-400">VS</div>
                            ${match.handicap ? `<div class="text-xs text-orange-500 mt-1">${match.handicap > 0 ? '客让'+match.handicap : '主让'+Math.abs(match.handicap)}</div>` : ''}
                        </div>
                        <div class="text-center flex-1">
                            <div class="text-lg font-bold text-gray-900 dark:text-white mb-1">${match.away_team}</div>
                            <div class="text-xs text-gray-500">客队</div>
                        </div>
                    </div>
                    
                    <div class="text-center text-sm text-gray-500 dark:text-gray-400 mb-4">
                        ${matchTime.toLocaleString('zh-CN')}
                    </div>
                    
                    ${isEnded ? `
                        <div class="text-center text-2xl font-bold text-blue-600 mb-3">
                            ${match.home_score} - ${match.away_score}
                        </div>
                    ` : ''}
                    
                    <div class="flex justify-center space-x-2">
                        ${!isStarted && !userGuess && currentUser.type !== '管理员' ? `
                            <button onclick="event.stopPropagation(); submitGuess(${match.id}, 'win')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">主胜</button>
                            <button onclick="event.stopPropagation(); submitGuess(${match.id}, 'draw')" class="px-4 py-2 bg-gray-600 text-white rounded-lg text-sm hover:bg-gray-700">平局</button>
                            <button onclick="event.stopPropagation(); submitGuess(${match.id}, 'lose')" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">客胜</button>
                        ` : userGuess ? `
                            <span class="px-4 py-2 bg-green-100 text-green-800 rounded-lg text-sm font-medium">
                                你已竞猜：${userGuess.prediction === 'win' ? '主胜' : userGuess.prediction === 'draw' ? '平局' : '客胜'}
                            </span>
                        ` : isStarted ? `
                            <span class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm">比赛已开始</span>
                        ` : ''}
                    </div>
                    
                    ${currentUser.type === '管理员' && !isEnded ? `
                        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <button onclick="event.stopPropagation(); showSettleModal(${match.id})" class="w-full bg-purple-600 text-white py-2 rounded-lg text-sm hover:bg-purple-700">
                                录入比分并结算
                            </button>
                        </div>
                    ` : ''}
                `;
                
                container.appendChild(card);
            });
        }

        // 提交竞猜
        async function submitGuess(matchId, prediction) {
            if (currentUser.type === '管理员') {
                alert('管理员不能参与竞猜');
                return;
            }

            const { error } = await supabase.from('guesses').insert({
                match_id: matchId,
                user_code: currentUser.code,
                prediction: prediction
            });

            if (error) {
                if (error.message.includes('duplicate')) {
                    alert('你已经竞猜过这场比赛了');
                } else {
                    alert('竞猜失败：' + error.message);
                }
            } else {
                alert('竞猜成功！');
                loadData();
            }
        }

        // 显示比赛详情
        async function showMatchDetail(matchId) {
            const match = matchesData.find(m => m.id === matchId);
            if (!match) return;

            const modal = document.getElementById('matchModal');
            const content = document.getElementById('modalContent');
            const matchGuesses = guessesData.filter(g => g.match_id === matchId);
            
            const now = new Date();
            const isStarted = now >= new Date(match.match_time);
            const isEnded = match.status === 'finished';
            const userGuess = matchGuesses.find(g => g.user_code === currentUser.code);

            // 计算每个人的历史准确率
            const guessRows = await Promise.all(matchGuesses.map(async (guess) => {
                const userStat = userStatsData.find(s => s.user_code === guess.user_code) || { total_guesses: 0, correct_guesses: 0 };
                const accuracy = userStat.total_guesses > 0 ? (userStat.correct_guesses / userStat.total_guesses * 100).toFixed(1) : '0.0';
                const userInfo = Object.entries(LOGIN_CODES).find(([code, info]) => code === guess.user_code);
                
                return `
                    <tr class="border-b border-gray-200 dark:border-gray-700">
                        <td class="py-3 flex items-center space-x-2">
                            <img src="${userInfo ? userInfo[1].avatar : ''}" class="w-6 h-6 rounded-full">
                            <span class="text-sm font-medium">${userInfo ? userInfo[1].username : guess.user_code}</span>
                        </td>
                        <td class="py-3 text-center">
                            <span class="px-2 py-1 rounded text-xs ${guess.prediction === 'win' ? 'bg-blue-100 text-blue-800' : guess.prediction === 'draw' ? 'bg-gray-100 text-gray-800' : 'bg-red-100 text-red-800'}">
                                ${guess.prediction === 'win' ? '主胜' : guess.prediction === 'draw' ? '平局' : '客胜'}
                            </span>
                        </td>
                        <td class="py-3 text-right text-sm text-gray-600 dark:text-gray-400">${accuracy}%</td>
                    </tr>
                `;
            }));

            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">${match.home_team} VS ${match.away_team}</h2>
                        <p class="text-gray-500 dark:text-gray-400 mt-1">${match.league} | ${match.category}</p>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                ${isEnded ? `
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-6 mb-6 text-center">
                        <div class="text-4xl font-bold text-blue-600 dark:text-blue-400 mb-2">${match.home_score} - ${match.away_score}</div>
                        <div class="text-sm text-gray-600 dark:text-gray-400">最终比分</div>
                        ${match.handicap ? `<div class="text-xs text-orange-500 mt-2">让球：${match.handicap > 0 ? '客让'+match.handicap : '主让'+Math.abs(match.handicap)}</div>` : ''}
                    </div>
                ` : `
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-6 mb-6 text-center">
                        <div class="text-lg text-gray-600 dark:text-gray-300">比赛时间</div>
                        <div class="text-2xl font-bold text-gray-900 dark:text-white mt-2">${new Date(match.match_time).toLocaleString('zh-CN')}</div>
                        ${match.handicap ? `<div class="text-sm text-orange-500 mt-2">让球盘：${match.handicap > 0 ? '客让'+match.handicap : '主让'+Math.abs(match.handicap)}</div>` : ''}
                    </div>
                `}

                ${!isStarted && !userGuess && currentUser.type !== '管理员' ? `
                    <div class="mb-6">
                        <h3 class="text-lg font-semibold mb-3">参与竞猜</h3>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="submitGuessFromModal(${match.id}, 'win')" class="py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">主胜</button>
                            <button onclick="submitGuessFromModal(${match.id}, 'draw')" class="py-3 bg-gray-600 text-white rounded-lg font-medium hover:bg-gray-700 transition">平局</button>
                            <button onclick="submitGuessFromModal(${match.id}, 'lose')" class="py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition">客胜</button>
                        </div>
                    </div>
                ` : userGuess ? `
                    <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/20 rounded-lg text-center">
                        <span class="text-green-800 dark:text-green-200">你已竞猜：<strong>${userGuess.prediction === 'win' ? '主胜' : userGuess.prediction === 'draw' ? '平局' : '客胜'}</strong></span>
                    </div>
                ` : ''}

                <div>
                    <h3 class="text-lg font-semibold mb-3">竞猜用户 (${matchGuesses.length}人)</h3>
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-xs text-gray-500 dark:text-gray-400 uppercase">
                                <th class="pb-2">用户</th>
                                <th class="pb-2 text-center">竞猜</th>
                                <th class="pb-2 text-right">历史准确率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${guessRows.join('') || '<tr><td colspan="3" class="py-4 text-center text-gray-500">暂无竞猜</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('matchModal').classList.add('hidden');
        }

        async function submitGuessFromModal(matchId, prediction) {
            await submitGuess(matchId, prediction);
            closeModal();
            showMatchDetail(matchId);
        }

        // 结算比赛
        function showSettleModal(matchId) {
            const match = matchesData.find(m => m.id === matchId);
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">录入比分</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div class="text-center mb-6">
                    <div class="flex items-center justify-center space-x-4 mb-4">
                        <div class="text-lg font-bold">${match.home_team}</div>
                        <input type="number" id="homeScore" min="0" class="w-16 h-16 text-center text-2xl font-bold border-2 border-blue-500 rounded-lg" placeholder="0">
                        <div class="text-2xl font-bold text-gray-400">-</div>
                        <input type="number" id="awayScore" min="0" class="w-16 h-16 text-center text-2xl font-bold border-2 border-red-500 rounded-lg" placeholder="0">
                        <div class="text-lg font-bold">${match.away_team}</div>
                    </div>
                    ${match.handicap ? `<div class="text-sm text-orange-500">让球：${match.handicap > 0 ? '客让'+match.handicap : '主让'+Math.abs(match.handicap)}</div>` : ''}
                </div>
                
                <button onclick="settleMatch(${matchId})" class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition">
                    确认并结算
                </button>
            `;
            
            document.getElementById('matchModal').classList.remove('hidden');
        }

        async function settleMatch(matchId) {
            const homeScore = parseInt(document.getElementById('homeScore').value);
            const awayScore = parseInt(document.getElementById('awayScore').value);
            
            if (isNaN(homeScore) || isNaN(awayScore)) {
                alert('请输入有效比分');
                return;
            }

            const match = matchesData.find(m => m.id === matchId);
            let adjustedHome = homeScore;
            let adjustedAway = awayScore;
            
            // 让球计算
            if (match.handicap) {
                const handicap = parseFloat(match.handicap);
                if (handicap < 0) {
                    adjustedHome += handicap; // 主让球，主队减
                } else {
                    adjustedAway -= handicap; // 客让球，客队减（相当于主队加）
                }
            }

            let result;
            if (adjustedHome > adjustedAway) result = 'win';
            else if (adjustedHome === adjustedAway) result = 'draw';
            else result = 'lose';

            // 更新比赛状态
            await supabase.from('matches').update({
                status: 'finished',
                home_score: homeScore,
                away_score: awayScore,
                result: result
            }).eq('id', matchId);

            // 结算所有竞猜
            const matchGuesses = guessesData.filter(g => g.match_id === matchId);
            for (const guess of matchGuesses) {
                const isCorrect = guess.prediction === result;
                const points = isCorrect ? 10 : -10;
                
                // 更新或创建用户统计
                const existingStat = userStatsData.find(s => s.user_code === guess.user_code);
                if (existingStat) {
                    await supabase.from('user_stats').update({
                        total_guesses: existingStat.total_guesses + 1,
                        correct_guesses: existingStat.correct_guesses + (isCorrect ? 1 : 0),
                        total_points: existingStat.total_points + points
                    }).eq('user_code', guess.user_code);
                } else {
                    await supabase.from('user_stats').insert({
                        user_code: guess.user_code,
                        total_guesses: 1,
                        correct_guesses: isCorrect ? 1 : 0,
                        total_points: points
                    });
                }
            }

            alert('结算完成！');
            closeModal();
            loadData();
        }

        // 红黑榜
        function loadRanking() {
            const sortedStats = [...userStatsData].sort((a, b) => b.total_points - a.total_points);
            const container = document.getElementById('rankingList');
            
            container.innerHTML = sortedStats.map((stat, index) => {
                const userInfo = Object.entries(LOGIN_CODES).find(([code, info]) => code === stat.user_code);
                const accuracy = stat.total_guesses > 0 ? (stat.correct_guesses / stat.total_guesses * 100).toFixed(1) : '0.0';
                
                return `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full ${index < 3 ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'} font-bold text-sm">
                                ${index + 1}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <img class="h-10 w-10 rounded-full object-cover border-2 border-gray-200 dark:border-gray-600" src="${userInfo ? userInfo[1].avatar : ''}" alt="">
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900 dark:text-white">${userInfo ? userInfo[1].username : stat.user_code}</div>
                                    <div class="text-xs text-gray-500">${userInfo ? userInfo[1].type : ''}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm text-gray-900 dark:text-white font-medium">
                            ${stat.total_guesses}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${accuracy >= 50 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${accuracy}%
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-bold ${stat.total_points >= 0 ? 'text-green-600' : 'text-red-600'}">
                            ${stat.total_points > 0 ? '+' : ''}${stat.total_points}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function resetAllPoints() {
            if (!confirm('确定要清零所有用户的积分吗？猜对率和总场次将保留。')) return;
            
            for (const stat of userStatsData) {
                await supabase.from('user_stats').update({ total_points: 0 }).eq('user_code', stat.user_code);
            }
            
            alert('积分已清零');
            loadData();
        }

        function updateUserPoints() {
            if (currentUser.type === '管理员') return;
            const stat = userStatsData.find(s => s.user_code === currentUser.code);
            if (stat) {
                document.getElementById('userPoints').textContent = `积分: ${stat.total_points > 0 ? '+' : ''}${stat.total_points}`;
            } else {
                document.getElementById('userPoints').textContent = '积分: 0';
            }
        }

        // 点击模态框外部关闭
        document.getElementById('matchModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 初始化
        init();
    </script>
</body>
</html>
